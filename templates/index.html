<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech Link Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg-main: #f0f2f5; --bg-card: #ffffff; --proj-name: #2da44e;
      --border-primary: #d0d7de; --transcript: #0969da;
      --text-primary: #1a1f23; --text-secondary: #57606a;
      --input-bg: #ffffff; --input-border: #d0d7de;
      --btn-primary-bg: #2da44e; --card-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    }
    body.dark {
      --bg-main: #0d1117; --bg-card: #161b22; --proj-name: #fbbf24;
      --border-primary: #30363d; --text-primary: #e6edf3;
      --text-secondary: #8b949e; --input-bg: #0d1117;
      --transcript: #58a6ff; --btn-primary-bg: #238636;
    }
    body {
      font-family: 'Segoe UI', sans-serif; background: var(--bg-main);
      color: var(--text-primary); margin: 0; display: flex;
      justify-content: center; align-items: center; min-height: 100vh;
      transition: background 0.3s ease;
    }
    .main-container { width: 95%; max-width: 900px; padding: 20px; }
    .act_container {
      background: var(--bg-card); padding: 50px; border-radius: 24px;
      box-shadow: var(--card-shadow); border: 1px solid var(--border-primary);
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 40px; border-bottom: 2px solid var(--border-primary);
      padding-bottom: 20px;
    }
    .proj_name { font-size: 42px; font-weight: 800; color: var(--proj-name); }
    #themeToggle { background: none; border: none; color: var(--text-secondary); font-size: 32px; cursor: pointer; }
    .section { margin-bottom: 40px; text-align: left; }
    h3 { font-size: 22px; margin-bottom: 15px; color: var(--text-secondary); }
    input[type='text'] {
      width: 100%; padding: 18px; font-size: 18px; border: 2px solid var(--border-primary);
      border-radius: 12px; background: var(--input-bg); color: var(--text-primary);
      box-sizing: border-box; margin-bottom: 15px;
    }
    .controls-row { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
    select { padding: 12px; font-size: 16px; border-radius: 8px; flex: 1; background: var(--input-bg); color: var(--text-primary); }
    button { padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; }
    .btn-send { background: var(--btn-primary-bg); color: white; width: 100%; }
    .btn-audio { background: #0969da; color: white; }
    .btn-transcribe { background: #f7971e; color: white; }
    #audioPlayer { width: 100%; margin: 20px 0; height: 50px; }
    #transcriptionBox {
      margin-top: 20px; padding: 25px; font-size: 26px; font-weight: 600;
      background: var(--bg-main); border-radius: 12px; border-left: 8px solid var(--transcript);
      min-height: 80px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="act_container">
      <div class="header">
        <div class="proj_name"><i class="fa-solid fa-tower-broadcast"></i> Speech Link</div>
        <button id="themeToggle"><i class="fa-solid fa-circle-half-stroke"></i></button>
      </div>

      <div class="section">
        <h3><i class="fa-solid fa-pen-to-square"></i> Send Text</h3>
        <input type="text" id="textMsg" placeholder="Type message here..." />
        <button class="btn-send" onclick="sendText()">Send Message</button>
      </div>

      <hr style="opacity: 0.1; margin: 40px 0;">

      <div class="section">
        <h3><i class="fa-solid fa-microphone-lines"></i> Voice Conversion</h3>
        <div class="controls-row">
          <select id="langSelect">
            <option value="en-IN">English (India)</option>
            <option value="hi-IN">Hindi (हिन्दी)</option>
            <option value="mr-IN">Marathi (मराठी)</option>
          </select>
          <button class="btn-audio" onclick="refreshAudio()"><i class="fa-solid fa-play"></i> Play</button>
          <button class="btn-transcribe" onclick="convertToText()"><i class="fa-solid fa-wand-magic-sparkles"></i> Transcribe</button>
        </div>
        <audio id="audioPlayer" controls></audio>
        <div id="transcriptionBox">No voice message received yet.</div>
      </div>
    </div>
  </div>

  <script>
    // --- POLLING LOGIC FOR POPUP ---
    function startPolling() {
      setInterval(() => {
        fetch('/check_new_audio')
          .then(res => res.json())
          .then(data => {
            if (data.new) {
              handleNewVoiceMessage();
            }
          }).catch(e => console.log("Polling..."));
      }, 3000); 
    }

    function handleNewVoiceMessage() {
      if (confirm("🔔 New Voice Message from ESP32! Play and Transcribe now?")) {
        refreshAudio();
        setTimeout(convertToText, 1000);
      }
    }

    // --- FUNCTIONAL LOGIC ---
    function sendText() {
      const val = document.getElementById('textMsg').value;
      if (!val) return;
      fetch('/send_text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: val })
      }).then(res => {
        if (res.ok) {
          alert("Sent to ESP32!");
          document.getElementById('textMsg').value = '';
        }
      });
    }

    function refreshAudio() {
      const player = document.getElementById('audioPlayer');
      player.src = '/get_portable_voice?t=' + new Date().getTime();
      player.play();
    }

    function convertToText() {
      const box = document.getElementById('transcriptionBox');
      const lang = document.getElementById('langSelect').value;
      box.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
      fetch('/transcribe_voice?lang=' + lang)
        .then(res => res.json())
        .then(data => { box.innerText = data.text; })
        .catch(err => { box.innerText = 'Error processing speech.'; });
    }

    // Theme Toggle
    const toggleBtn = document.getElementById('themeToggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

    // Start checking for messages on load
    window.onload = startPolling;
  </script>
</body>
</html>
